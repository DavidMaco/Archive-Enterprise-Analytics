[theme]
# Professional dark theme aligned to the dashboard's colour palette
primaryColor    = "#4F8BF9"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1C2433"
textColor       = "#FAFAFA"
font            = "sans serif"

[server]
headless            = true
enableCORS          = false
enableXsrfProtection = true
maxUploadSize       = 50

[browser]
gatherUsageStats = false
